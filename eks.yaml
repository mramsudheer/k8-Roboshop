# spot-cluster.yaml

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop
  region: us-east-1

managedNodeGroups:
- name: spot
  #instanceTypes: ["c3.large","c4.large","c5.large","c5d.large","c5n.large","c5a.large"]
  instanceTypes: ["C7i-flex.large","M7i-flex.large","T4g.small","T4g.micro","cT3.small","T3.micro"]
  spot: true
  desiredCapacity: 2